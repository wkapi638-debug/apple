<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browser FPS Prototype</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #000;
      font-family: system-ui, sans-serif;
      color: white;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(0,0,0,0.7), rgba(0,0,0,0.95));
      cursor: pointer;
      z-index: 10;
      flex-direction: column;
      text-align: center;
      gap: 0.5rem;
    }
    #overlay h1 {
      font-size: 2rem;
      margin: 0;
    }
    #overlay p {
      margin: 0;
      opacity: 0.8;
    }
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 5;
      font-size: 14px;
      text-shadow: 0 0 4px #000;
    }
    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      box-sizing: border-box;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>FPS Prototype</h1>
    <p>Click to start, then use <b>WASD</b> to move, <b>Space</b> to jump, and <b>Left-Click</b> to shoot.</p>
  </div>
  <div id="hud">
    <div id="health">Health: 100</div>
    <div id="kills">Kills: 0</div>
  </div>
  <div id="crosshair"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.164.0/build/three.module.js";
    import { PointerLockControls } from "https://unpkg.com/three@0.164.0/examples/jsm/controls/PointerLockControls.js";

    let camera, scene, renderer;
    let controls;
    let moveForward = false,
        moveBackward = false,
        moveLeft = false,
        moveRight = false,
        canJump = false;

    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    const bullets = [];
    const enemies = [];
    let prevTime = performance.now();
    let playerHealth = 100;
    let kills = 0;

    const hudHealth = document.getElementById("health");
    const hudKills = document.getElementById("kills");
    const overlay = document.getElementById("overlay");

    init();
    animate();

    function init() {
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050509);
      scene.fog = new THREE.Fog(0x050509, 10, 80);

      camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );

      controls = new PointerLockControls(camera, document.body);
      scene.add(controls.getObject());

      overlay.addEventListener("click", () => {
        controls.lock();
      });

      controls.addEventListener("lock", () => {
        overlay.style.display = "none";
      });

      controls.addEventListener("unlock", () => {
        overlay.style.display = "flex";
      });

      const hemiLight = new THREE.HemisphereLight(0x8888ff, 0x222211, 0.7);
      scene.add(hemiLight);

      const dirLight = new THREE.DirectionalLight(0xfff4d0, 0.9);
      dirLight.position.set(10, 20, 5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(1024, 1024);
      scene.add(dirLight);

      const floorGeo = new THREE.PlaneGeometry(200, 200);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0x22252b,
        roughness: 1.0,
        metalness: 0.0,
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      createArena();

      for (let i = 0; i < 10; i++) {
        spawnEnemy();
      }

      const onKeyDown = (event) => {
        switch (event.code) {
          case "ArrowUp":
          case "KeyW":
            moveForward = true;
            break;
          case "ArrowLeft":
          case "KeyA":
            moveLeft = true;
            break;
          case "ArrowDown":
          case "KeyS":
            moveBackward = true;
            break;
          case "ArrowRight":
          case "KeyD":
            moveRight = true;
            break;
          case "Space":
            if (canJump === true) velocity.y += 5;
            canJump = false;
            break;
        }
      };

      const onKeyUp = (event) => {
        switch (event.code) {
          case "ArrowUp":
          case "KeyW":
            moveForward = false;
            break;
          case "ArrowLeft":
          case "KeyA":
            moveLeft = false;
            break;
          case "ArrowDown":
          case "KeyS":
            moveBackward = false;
            break;
          case "ArrowRight":
          case "KeyD":
            moveRight = false;
            break;
        }
      };

      document.addEventListener("keydown", onKeyDown);
      document.addEventListener("keyup", onKeyUp);

      document.addEventListener("mousedown", (event) => {
        if (!controls.isLocked) return;
        if (event.button === 0) {
          shoot();
        }
      });

      window.addEventListener("resize", onWindowResize);

      controls.getObject().position.set(0, 2, 10);
    }

    function createArena() {
      const wallMat = new THREE.MeshStandardMaterial({
        color: 0x323542,
        metalness: 0.1,
        roughness: 0.8,
      });

      const wallHeight = 5;
      const wallThickness = 1;
      const arenaSize = 40;

      const longWallGeo = new THREE.BoxGeometry(arenaSize, wallHeight, wallThickness);
      const shortWallGeo = new THREE.BoxGeometry(wallThickness, wallHeight, arenaSize);

      function addWall(geo, x, y, z) {
        const wall = new THREE.Mesh(geo, wallMat);
        wall.position.set(x, y, z);
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);
      }

      addWall(longWallGeo, 0, wallHeight / 2, -arenaSize / 2);
      addWall(longWallGeo, 0, wallHeight / 2, arenaSize / 2);
      addWall(shortWallGeo, -arenaSize / 2, wallHeight / 2, 0);
      addWall(shortWallGeo, arenaSize / 2, wallHeight / 2, 0);

      const blockGeo = new THREE.BoxGeometry(4, 4, 4);
      for (let i = 0; i < 8; i++) {
        const block = new THREE.Mesh(blockGeo, wallMat);
        const angle = (i / 8) * Math.PI * 2;
        const radius = 10 + Math.random() * 8;
        block.position.set(
          Math.cos(angle) * radius,
          2,
          Math.sin(angle) * radius
        );
        block.castShadow = true;
        block.receiveShadow = true;
        scene.add(block);
      }
    }

    function spawnEnemy() {
      const geo = new THREE.BoxGeometry(1.5, 2.5, 1.5);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xa02020,
        metalness: 0.2,
        roughness: 0.7,
      });
      const enemy = new THREE.Mesh(geo, mat);
      enemy.castShadow = true;
      enemy.receiveShadow = true;

      const radius = 15 + Math.random() * 20;
      const angle = Math.random() * Math.PI * 2;
      enemy.position.set(
        Math.cos(angle) * radius,
        1.25,
        Math.sin(angle) * radius
      );

      enemy.userData = {
        health: 3,
        speed: 1 + Math.random() * 0.5,
      };

      scene.add(enemy);
      enemies.push(enemy);
    }

    function shoot() {
      const bulletGeo = new THREE.SphereGeometry(0.1, 8, 8);
      const bulletMat = new THREE.MeshStandardMaterial({
        color: 0xffffaa,
        emissive: 0xffffaa,
        emissiveIntensity: 0.6,
      });
      const bullet = new THREE.Mesh(bulletGeo, bulletMat);
      bullet.castShadow = true;
      bullet.receiveShadow = true;

      const origin = new THREE.Vector3();
      origin.copy(controls.getObject().position);
      origin.y += 1.0;
      bullet.position.copy(origin);

      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      dir.normalize();

      const speed = 80;
      bullets.push({
        mesh: bullet,
        dir,
        speed,
        life: 0,
      });

      scene.add(bullet);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function updatePlayer(delta) {
      if (!controls.isLocked) return;

      const damping = 10.0;
      velocity.x -= velocity.x * damping * delta;
      velocity.z -= velocity.z * damping * delta;

      velocity.y -= 9.8 * 5.0 * delta;

      direction.z = Number(moveForward) - Number(moveBackward);
      direction.x = Number(moveRight) - Number(moveLeft);
      direction.normalize();

      const speed = 30.0;

      if (moveForward || moveBackward) {
        velocity.z -= direction.z * speed * delta;
      }
      if (moveLeft || moveRight) {
        velocity.x -= direction.x * speed * delta;
      }

      const controlObject = controls.getObject();
      controlObject.translateX(velocity.x * delta);
      controlObject.translateZ(velocity.z * delta);

      controlObject.position.y += velocity.y * delta;

      if (controlObject.position.y < 2) {
        velocity.y = 0;
        controlObject.position.y = 2;
        canJump = true;
      }
    }

    function updateBullets(delta) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.life += delta;
        b.mesh.position.addScaledVector(b.dir, b.speed * delta);

        if (b.life > 2 || b.mesh.position.length() > 200) {
          scene.remove(b.mesh);
          bullets.splice(i, 1);
          continue;
        }

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          const dist = b.mesh.position.distanceTo(e.position);
          if (dist < 1.2) {
            e.userData.health -= 1;
            scene.remove(b.mesh);
            bullets.splice(i, 1);
            if (e.userData.health <= 0) {
              scene.remove(e);
              enemies.splice(j, 1);
              kills++;
              hudKills.textContent = `Kills: ${kills}`;
              spawnEnemy();
            }
            break;
          }
        }
      }
    }

    function updateEnemies(delta) {
      const playerPos = controls.getObject().position;

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dir = new THREE.Vector3().subVectors(playerPos, e.position);
        const dist = dir.length();
        dir.normalize();

        dir.y = 0;
        e.position.addScaledVector(dir, e.userData.speed * delta);

        const angle = Math.atan2(playerPos.x - e.position.x, playerPos.z - e.position.z);
        e.rotation.y = angle;

        if (dist < 1.8) {
          playerHealth -= 20 * delta;
          if (playerHealth < 0) playerHealth = 0;
          hudHealth.textContent = `Health: ${playerHealth.toFixed(0)}`;
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();
      const delta = (time - prevTime) / 1000;

      updatePlayer(delta);
      updateBullets(delta);
      updateEnemies(delta);

      renderer.render(scene, camera);
      prevTime = time;
    }
  </script>
</body>
</html>
